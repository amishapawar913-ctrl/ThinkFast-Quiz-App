<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThinkFast Pro</title>
<link rel="stylesheet" href="style.css">
</head><body><div class="app"><h1>ThinkFast Pro</h1>
<p class="tagline">Choose a category and test your knowledge!</p><div id="menu-screen"><h3>Select Category</h3><div class="menu-buttons">
<button onclick="startCategory('web')">Web Development</button>
<button onclick="startCategory('programming')">Programming</button>
<button onclick="startCategory('gk')">General Knowledge</button>
</div><h3>Select Difficulty</h3><div class="menu-buttons">
<button onclick="setDifficulty('easy')">Easy</button>
<button onclick="setDifficulty('medium')">Medium</button>
<button onclick="setDifficulty('hard')">Hard</button>
</div></div><div id="quiz-screen" class="hide"><div class="progress-container">
<div id="progress"></div>
</div><div class="top-bar">
<span id="question-count"></span>
<span id="timer">15</span>
</div><h2 id="question"></h2><div id="answer-buttons"></div><button id="next-btn">Next Question</button>

</div><div id="result-screen" class="hide"><h2>Quiz Finished 🎉</h2><p id="score"></p><h3>Leaderboard</h3><ul id="leaderboard"></ul><button onclick="restartQuiz()">Play Again</button>

</div></div><script src="script.js"></script></body>
</html>
